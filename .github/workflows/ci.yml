name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atelier04

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atelier04
          REDIS_URL: redis://localhost:6379
          API_KEY: ci-test-api-key-minimum-32-characters-long
          BASE_URL: http://localhost:3000
          ATELIER04_VERIFICATION_BASE: https://atelier04.at/credentials
          EUROPASS_WALLET_URL: https://europass.europa.eu/edci-wallet/api/v1/wallets/email
          ESEAL_P12_PATH: ""
          ESEAL_P12_PASSWORD: ""
